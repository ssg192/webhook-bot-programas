# ---- WhatsApp Cloud API ----
# Token permanente (system user) o temporal (24h para pruebas) del panel de Meta
wa.access-token=${WA_ACCESS_TOKEN}
# Phone Number ID (NO es el número de teléfono; sale en el panel de WhatsApp > API Setup)
wa.phone-number-id=${WA_PHONE_NUMBER_ID}
# Token inventado por ti; el mismo que pongas al registrar el webhook en Meta
wa.verify-token=${WA_VERIFY_TOKEN:cambiame-por-algo-secreto}

drive.lyrics-history-folder-id=${DRIVE_LYRICS_HISTORY_FOLDER_ID:}
# Graph API
quarkus.rest-client.graph-api.url=https://graph.facebook.com/v21.0

# ---- Google Drive (OAuth de usuario: los archivos son de la cuenta de 2TB) ----
# Los 3 valores los imprime TokenGenerator (ver README)
drive.oauth.client-id=${DRIVE_CLIENT_ID}
drive.oauth.client-secret=${DRIVE_CLIENT_SECRET}
drive.oauth.refresh-token=${DRIVE_REFRESH_TOKEN}
drive.root-folder-id=${DRIVE_ROOT_FOLDER_ID}

# ---- Bot ----
# Números permitidos (wa_id, ej. 5215512345678), separados por coma. Vacío = todos.
bot.allowed-numbers=${ALLOWED_NUMBERS:}
bot.tmp-dir=${TMP_DIR:/tmp/wa-drive-bot}
quarkus.http.access-log.enabled=true

quarkus.http.port=8080
